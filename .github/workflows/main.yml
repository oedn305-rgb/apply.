name: Job Search Bot

on:
  schedule:
    - cron: '0 5 * * *' # يشتغل 5 فجرًا بتوقيت جرينتش = 8 صباحًا بتوقيت السعودية بالضبط
  workflow_dispatch: # يتيح لك التشغيل اليدوي في أي وقت للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري للسماح للبوت بتحديث ملف الإيميلات وحذف المرسل منها

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run bot
        env:
          # تأكد أن هذه الأسماء مطابقة تماماً لما وضعته في Settings > Secrets
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python apply.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add all_emails.txt
          git commit -m "Update list: Sent emails at 8 AM KSA [skip ci]" || exit 0
          git push
