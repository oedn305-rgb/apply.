name: Job Search Bot

on:
  schedule:
    - cron: '0 8 * * *' # يشتغل كل يوم الساعة 8 صباحاً
  workflow_dispatch: # زر لتشغيله يدوياً للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests # أضف أي مكتبات تحتاجها

      - name: Run bot
        env:
          # هنا نربط الـ Secrets بالكود
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python apply.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add all_emails.txt
          git commit -m "Update email list [skip ci]" || exit 0
          git push
