name: Job Search Bot

on:
  schedule:
    - cron: '0 8 * * *' # يشتغل تلقائياً 8 صباحاً
  workflow_dispatch: # يتيح لك التشغيل اليدوي الآن للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري للسماح للبوت بحذف الإيميلات من الملف

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run bot
        env:
          # الربط بين Secrets و Python (تأكد أن الأسماء تطابق ما وضعته في Settings)
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python apply.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add all_emails.txt
          git commit -m "Update list: Sent 200 emails [skip ci]" || exit 0
          git push
