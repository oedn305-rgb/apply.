name: Jobs Bot
on:
  workflow_dispatch: # للتشغيل اليدوي بضغطة زر
  schedule:
    - cron: '0 6 * * 1-5' # يشتغل 9 صباحاً بتوقيت السعودية (الأحد - الخميس)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Application Bot
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python apply.py
